<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pearagon Task 2</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Pearagon Task 2</p>
        <h1>Count Controls</h1>
        <p class="description">
          This page reads the current count from the server and updates it through the
          increment API.
        </p>

        <div class="count-group" aria-live="polite">
          <p class="count-label">Current Count</p>
          <p id="countDisplay" class="count-value" hidden></p>
        </div>

        <div class="controls">
          <button id="incrementButton" type="button">Increment</button>

          <label class="field" for="multiplierInput">
            <span>Multiplier</span>
            <input id="multiplierInput" type="number" inputmode="numeric" min="1" value="2" />
          </label>

          <button id="multiplyButton" type="button">Multiply</button>
        </div>

        <p id="errorMessage" class="error-message" role="alert"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
